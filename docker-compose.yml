name: multi-source-procurement-lakehouse

services:
 postgres-warehouse:
  image: postgres:16
  restart: unless-stopped
  environment:
   POSTGRES_DB: ${POSTGRES_DB:-procurement}
   POSTGRES_USER: ${POSTGRES_USER:-procurement}
   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-procurement}
  ports:
   - "5434:5432"
  volumes:
   - postgres_data:/var/lib/postgresql/data
   - ./sql/warehouse_init.sql:/docker-entrypoint-initdb.d/warehouse_init.sql:ro
  healthcheck:
   test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
   interval: 10s
   timeout: 5s
   retries: 8

 minio:
  image: minio/minio:RELEASE.2025-04-22T22-12-26Z
  restart: unless-stopped
  command: server /data --console-address ":9001"
  environment:
   MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
   MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  ports:
   - "9000:9000"
   - "9001:9001"
  volumes:
   - minio_data:/data

 airflow-init:
  image: procurement-airflow:local
  build:
   context: .
   dockerfile: airflow/Dockerfile
  depends_on:
   postgres-warehouse:
    condition: service_healthy
  environment: &airflow_env
   AIRFLOW__CORE__EXECUTOR: LocalExecutor
   AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-procurement}:${POSTGRES_PASSWORD:-procurement}@postgres-warehouse:5432/${POSTGRES_DB:-procurement}
   AIRFLOW__CORE__LOAD_EXAMPLES: "false"
   AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me-local}
   PROJECT_ROOT: /opt/app
   PYTHONPATH: /opt/app
   MINIO_ENDPOINT: minio:9000
   POSTGRES_HOST: postgres-warehouse
   POSTGRES_PORT: 5432
   OFFLINE_API_MODE: ${OFFLINE_API_MODE:-true}
  volumes:
   - .:/opt/app
   - ./airflow/dags:/opt/airflow/dags
   - airflow_logs:/opt/airflow/logs
  command: >
   bash -c "
   airflow db migrate &&
   airflow users create
   --username $${AIRFLOW_ADMIN_USER:-admin}
   --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
   --firstname Data
   --lastname Engineer
   --role Admin
   --email admin@example.com || true
   "

 airflow-webserver:
  image: procurement-airflow:local
  build:
   context: .
   dockerfile: airflow/Dockerfile
  restart: unless-stopped
  depends_on:
   airflow-init:
    condition: service_completed_successfully
  environment: *airflow_env
  volumes:
   - .:/opt/app
   - ./airflow/dags:/opt/airflow/dags
   - airflow_logs:/opt/airflow/logs
  ports:
   - "8080:8080"
  command: webserver

 airflow-scheduler:
  image: procurement-airflow:local
  build:
   context: .
   dockerfile: airflow/Dockerfile
  restart: unless-stopped
  depends_on:
   airflow-init:
    condition: service_completed_successfully
  environment: *airflow_env
  volumes:
   - .:/opt/app
   - ./airflow/dags:/opt/airflow/dags
   - airflow_logs:/opt/airflow/logs
  command: scheduler

 superset:
  image: apache/superset:4.1.2
  restart: unless-stopped
  depends_on:
   postgres-warehouse:
    condition: service_healthy
  environment:
   SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-local}
   SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
   SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
  ports:
   - "8088:8088"
  volumes:
   - superset_home:/app/superset_home
  command: >
   bash -c "
   superset db upgrade &&
   superset fab create-admin
   --username $${SUPERSET_ADMIN_USER:-admin}
   --firstname Superset
   --lastname Admin
   --email admin@example.com
   --password $${SUPERSET_ADMIN_PASSWORD:-admin} || true &&
   superset init &&
   superset run -h 0.0.0.0 -p 8088
   "

 app-worker:
  image: procurement-app-worker:local
  build:
   context: .
   dockerfile: Dockerfile
  profiles:
   - worker
  restart: "no"
  depends_on:
   postgres-warehouse:
    condition: service_healthy
   minio:
    condition: service_started
  environment:
   PYTHONPATH: /opt/app
   MINIO_ENDPOINT: minio:9000
   POSTGRES_HOST: postgres-warehouse
   POSTGRES_PORT: 5432
   OFFLINE_API_MODE: ${OFFLINE_API_MODE:-true}
  volumes:
   - .:/opt/app

 jenkins:
  build:
   context: ./jenkins
  profiles:
   - ci
  user: root
  restart: unless-stopped
  ports:
   - "8081:8080"
  volumes:
   - jenkins_home:/var/jenkins_home
   - /var/run/docker.sock:/var/run/docker.sock

volumes:
 postgres_data:
 minio_data:
 airflow_logs:
 superset_home:
 jenkins_home:
